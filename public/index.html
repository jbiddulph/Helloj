<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basic Web Application</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Basic Web Application</h1>
      <p class="subtitle">A minimal starter built with HTML, CSS, and JavaScript.</p>

      <section class="card">
        <h2>Quick Notes</h2>
        <form id="note-form">
          <label for="note-input">Add a note</label>
          <div class="row">
            <input id="note-input" name="note" type="text" placeholder="Type something..." required />
            <button type="submit">Add</button>
          </div>
        </form>
        <ul id="note-list" aria-live="polite"></ul>
      </section>

      <section class="card status">
        <h2>Server Status</h2>
        <p id="server-status">Checking...</p>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
