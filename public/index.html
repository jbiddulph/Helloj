<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canvas Drawing Project</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>HTML5 Canvas Drawing Project</h1>
        <p class="subtitle">Draw with mouse or touch, change brush size, erase, clear, and save your art.</p>
      </header>

      <section class="card controls" aria-label="Drawing controls">
        <label for="color-picker">Color</label>
        <input id="color-picker" type="color" value="#2563eb" />

        <label for="brush-size">Brush Size</label>
        <input id="brush-size" type="range" min="1" max="50" value="6" />
        <output id="brush-size-value" for="brush-size">6px</output>

        <button id="draw-mode" type="button" class="active">Draw</button>
        <button id="erase-mode" type="button">Erase</button>
        <button id="clear-canvas" type="button">Clear</button>
        <button id="save-image" type="button">Save PNG</button>
      </section>

      <section class="card canvas-card">
        <canvas id="drawing-canvas" width="960" height="540" aria-label="Drawing canvas"></canvas>
      </section>

      <section class="card status">
        <h2>Server Status</h2>
        <p id="server-status">Checking...</p>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
